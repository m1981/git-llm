<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Viewer — git-llm</title>
<style>
:root {
  --bg: #ffffff; --bg-alt: #f8f9fa; --bg-card: #ffffff;
  --fg: #1a1a2e; --fg-muted: #6b7280; --fg-faint: #9ca3af;
  --border: #e5e7eb; --border-focus: #6366f1;
  --accent: #6366f1; --accent-soft: #eef2ff;
  --user: #059669; --user-soft: #ecfdf5;
  --assistant: #6366f1; --assistant-soft: #eef2ff;
  --thinking: #d97706; --thinking-soft: #fffbeb;
  --tool: #9ca3af; --tool-soft: #f3f4f6;
  --label-bg: #f3f4f6; --label-border: #d1d5db;
  --phase-action: #059669; --phase-exploration: #6366f1;
  --phase-evaluation: #d97706; --phase-generation: #8b5cf6;
  --phase-reflection: #ec4899;
  --sidebar-w: 280px; --topbar-h: 48px;
  --radius: 6px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px; line-height: 1.5; color: var(--fg); background: var(--bg-alt); }

/* ── Layout ──────────────────────────────────────────────────────────── */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
  background: var(--bg); border-right: 1px solid var(--border);
  overflow-y: auto; z-index: 10; padding: 16px 0; }
.topbar { position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--topbar-h);
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px; z-index: 9; }
.main { margin-left: var(--sidebar-w); margin-top: var(--topbar-h);
  padding: 24px; max-width: 960px; }

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar-section { padding: 0 16px; margin-bottom: 24px; }
.sidebar-title { font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--fg-muted); margin-bottom: 8px; }
.session-title { font-size: 15px; font-weight: 600; color: var(--fg);
  padding: 0 16px 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.session-meta { font-size: 12px; color: var(--fg-muted); padding: 0 16px; margin-bottom: 4px; }

/* Phase nav */
.phase-nav { list-style: none; }
.phase-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border-radius: var(--radius); cursor: pointer; font-size: 12px;
  color: var(--fg-muted); transition: all 0.15s; margin-bottom: 2px; }
.phase-item:hover { background: var(--bg-alt); color: var(--fg); }
.phase-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
.phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.phase-dot.ACTION { background: var(--phase-action); }
.phase-dot.EXPLORATION { background: var(--phase-exploration); }
.phase-dot.EVALUATION { background: var(--phase-evaluation); }
.phase-dot.GENERATION { background: var(--phase-generation); }
.phase-dot.REFLECTION { background: var(--phase-reflection); }
.phase-range { color: var(--fg-faint); font-size: 11px; margin-left: auto; }

/* Artifacts */
.artifact-item { padding: 8px; border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.artifact-item:hover { border-color: var(--accent); background: var(--accent-soft); }
.artifact-kind { font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--accent); }
.artifact-title { color: var(--fg); margin-top: 2px; }

/* ── Topbar ──────────────────────────────────────────────────────────── */
.search-box { flex: 1; max-width: 360px; position: relative; }
.search-box input { width: 100%; padding: 6px 12px 6px 32px; border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 13px; outline: none; background: var(--bg-alt); }
.search-box input:focus { border-color: var(--accent); background: var(--bg); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--fg-faint); font-size: 14px; pointer-events: none; }
.stats { display: flex; gap: 16px; font-size: 12px; color: var(--fg-muted); }
.stat-value { font-weight: 600; color: var(--fg); }
.filter-toggles { display: flex; gap: 8px; }
.toggle-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11px; cursor: pointer; background: var(--bg); color: var(--fg-muted);
  transition: all 0.15s; user-select: none; }
.toggle-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* ── Main content ────────────────────────────────────────────────────── */
.phase-group { margin-bottom: 32px; }
.phase-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 12px; position: sticky; top: var(--topbar-h); z-index: 5;
  box-shadow: var(--shadow); }
.phase-state { font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 2px 8px; border-radius: 3px; }
.phase-state.ACTION { background: #ecfdf5; color: var(--phase-action); }
.phase-state.EXPLORATION { background: #eef2ff; color: var(--phase-exploration); }
.phase-state.EVALUATION { background: #fffbeb; color: var(--phase-evaluation); }
.phase-state.GENERATION { background: #f5f3ff; color: var(--phase-generation); }
.phase-state.REFLECTION { background: #fdf2f8; color: var(--phase-reflection); }
.phase-flow { font-size: 12px; color: var(--fg-muted); }
.phase-labels { font-size: 11px; color: var(--fg-faint); margin-left: auto; }

/* Turn card */
.turn-card { background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
  transition: all 0.15s; box-shadow: var(--shadow); }
.turn-card:hover { border-color: var(--border-focus); }
.turn-card.hidden { display: none; }
.turn-card.highlighted { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.turn-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  cursor: pointer; user-select: none; }
.turn-header:hover { background: var(--bg-alt); }
.turn-idx { font-size: 11px; font-weight: 600; color: var(--fg-faint);
  font-family: 'SF Mono', Monaco, Consolas, monospace; min-width: 32px; }
.turn-role { font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; padding: 2px 6px; border-radius: 3px; }
.turn-role.user { background: var(--user-soft); color: var(--user); }
.turn-role.assistant { background: var(--assistant-soft); color: var(--assistant); }
.turn-type { font-size: 10px; padding: 2px 6px; border-radius: 3px; }
.turn-type.thinking { background: var(--thinking-soft); color: var(--thinking); }
.turn-type.tool { background: var(--tool-soft); color: var(--tool); }
.turn-charcount { font-size: 11px; color: var(--fg-faint); margin-left: auto;
  font-family: monospace; }
.turn-expand { font-size: 12px; color: var(--fg-faint); transition: transform 0.2s; }
.turn-expand.open { transform: rotate(90deg); }
.turn-labels { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 12px 8px; }
.label-badge { font-size: 10px; padding: 1px 6px; border: 1px solid var(--label-border);
  border-radius: 3px; background: var(--label-bg); color: var(--fg-muted);
  cursor: pointer; transition: all 0.15s; }
.label-badge:hover, .label-badge.active { background: var(--accent-soft);
  border-color: var(--accent); color: var(--accent); }
.turn-content { padding: 0 12px 12px; display: none; }
.turn-content.open { display: block; }
.turn-content pre { white-space: pre-wrap; word-break: break-word;
  font-size: 13px; line-height: 1.6; color: var(--fg); max-height: 600px;
  overflow-y: auto; padding: 12px; background: var(--bg-alt); border-radius: var(--radius);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
mark { background: #fef08a; padding: 1px 2px; border-radius: 2px; }

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  .main { padding: 16px; }
  .topbar { left: 0; padding: 0 16px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div style="padding:0 16px 12px;display:flex;gap:8px">
    <a href="search.html" style="font-size:11px;color:var(--accent);text-decoration:none">← Search</a>
    <a href="index.html" style="font-size:11px;color:var(--fg-faint);text-decoration:none">Gallery</a>
  </div>
  <div class="session-title" id="sessionTitle">Loading…</div>
  <div class="session-meta" id="sessionMeta"></div>

  <div class="sidebar-section">
    <div class="sidebar-title">Phases</div>
    <ul class="phase-nav" id="phaseNav"></ul>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-title">Extracted Knowledge</div>
    <div id="artifactsList"></div>
  </div>
</aside>

<!-- Topbar -->
<header class="topbar">
  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search turns… (content, labels, session)" autocomplete="off">
  </div>
  <div class="stats" id="stats"></div>
  <div class="filter-toggles">
    <div class="toggle-btn" id="toggleThinking" data-active="false">🧠 Thinking</div>
    <div class="toggle-btn" id="toggleTool" data-active="false">🔧 Tools</div>
  </div>
</header>

<!-- Main -->
<main class="main" id="main"></main>

<script>
// ── Data loading ──────────────────────────────────────────────────────
let DATA = null;
let activeLabel = null;
let searchQuery = '';

async function loadData() {
  try {
    const resp = await fetch('session-view.json');
    if (!resp.ok) throw new Error(resp.status);
    DATA = await resp.json();
    render();
  } catch (e) {
    // Fallback: try loading via embedded script tag
    const el = document.getElementById('session-data');
    if (el) {
      try { DATA = JSON.parse(el.textContent); render(); return; } catch(_) {}
    }
    document.getElementById('main').innerHTML =
      '<div style="padding:40px;max-width:600px">' +
      '<h2 style="color:#ef4444;margin-bottom:16px">Could not load data</h2>' +
      '<p style="margin-bottom:16px">The viewer needs <code>session-view.json</code> in the same directory.</p>' +
      '<h3 style="margin-bottom:8px">Option 1: Local server</h3>' +
      '<pre style="background:#f3f4f6;padding:12px;border-radius:6px">cd docs/evaluation\npython3 -m http.server 8000\n# Open http://localhost:8000/session-view.html</pre>' +
      '<h3 style="margin:16px 0 8px">Option 2: Embed data</h3>' +
      '<p>Run the generator with <code>--embed</code> to create a self-contained HTML file.</p>' +
      '</div>';
  }
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  renderMeta();
  renderStats();
  renderPhaseNav();
  renderArtifacts();
  renderTurns();
}

function renderMeta() {
  const m = DATA.meta;
  document.getElementById('sessionTitle').textContent = m.title || `Chat ${m.chat_id}`;
  document.getElementById('sessionMeta').innerHTML =
    `<div>${m.source} · ${m.turn_count} turns · ${m.label_count} labels</div>` +
    (m.session_id ? `<div style="margin-top:2px;font-size:11px;color:var(--fg-faint)">${m.session_id.slice(0,12)}…</div>` : '');
}

function renderStats() {
  const m = DATA.meta;
  const phases = DATA.phases.length;
  const artifacts = DATA.artifacts.length;
  document.getElementById('stats').innerHTML =
    `<span><span class="stat-value">${m.turn_count}</span> turns</span>` +
    `<span><span class="stat-value">${phases}</span> phases</span>` +
    `<span><span class="stat-value">${artifacts}</span> notes</span>`;
}

function renderPhaseNav() {
  const nav = document.getElementById('phaseNav');
  nav.innerHTML = DATA.phases.map((p, i) =>
    `<li class="phase-item" data-phase="${i}" onclick="scrollToPhase(${i})">` +
    `<span class="phase-dot ${p.state}"></span>` +
    `<span>${p.state.toLowerCase()}</span>` +
    `<span class="phase-range">${p.start}–${p.end}</span></li>`
  ).join('');
}

function renderArtifacts() {
  const list = document.getElementById('artifactsList');
  if (!DATA.artifacts.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--fg-faint)">No artifacts extracted</div>';
    return;
  }
  list.innerHTML = DATA.artifacts.map(a =>
    `<div class="artifact-item" onclick="scrollToTurn(${a.turn_start})">` +
    `<div class="artifact-kind">${a.kind}</div>` +
    `<div class="artifact-title">${escapeHtml(a.title)}</div></div>`
  ).join('');
}

function renderTurns() {
  const main = document.getElementById('main');
  const showThinking = document.getElementById('toggleThinking').dataset.active === 'true';
  const showTool = document.getElementById('toggleTool').dataset.active === 'true';

  let html = '';
  DATA.phases.forEach((phase, pi) => {
    const turns = DATA.turns.filter(t => t.idx >= phase.start && t.idx <= phase.end);
    html += `<div class="phase-group" id="phase-${pi}">`;
    html += `<div class="phase-header">`;
    html += `<span class="phase-state ${phase.state}">${phase.state}</span>`;
    html += `<span class="phase-flow">${phase.flow.join(' → ')}</span>`;
    html += `<span class="phase-labels">${phase.labels.join(', ')}</span>`;
    html += `</div>`;

    turns.forEach(turn => {
      const isThinking = turn.content_type === 'thinking';
      const isTool = turn.content_type === 'tool';
      const hidden = (isThinking && !showThinking) || (isTool && !showTool);
      const matchesSearch = !searchQuery || turn.content.toLowerCase().includes(searchQuery);
      const matchesLabel = !activeLabel || turn.labels.includes(activeLabel);

      html += `<div class="turn-card${hidden ? ' hidden' : ''}${!matchesSearch || !matchesLabel ? ' hidden' : ''}" ` +
        `data-idx="${turn.idx}" data-labels="${turn.labels.join(',')}" data-type="${turn.content_type}">`;
      html += `<div class="turn-header" onclick="toggleTurn(${turn.idx})">`;
      html += `<span class="turn-idx">#${turn.idx}</span>`;
      html += `<span class="turn-role ${turn.role}">${turn.role}</span>`;
      if (isThinking) html += `<span class="turn-type thinking">thinking</span>`;
      if (isTool) html += `<span class="turn-type tool">tool</span>`;
      html += `<span class="turn-charcount">${turn.char_count.toLocaleString()} chars</span>`;
      html += `<span class="turn-expand" id="exp-${turn.idx}">▸</span>`;
      html += `</div>`;

      if (turn.labels.length) {
        html += `<div class="turn-labels">`;
        turn.labels.forEach(l => {
          const active = l === activeLabel ? ' active' : '';
          html += `<span class="label-badge${active}" onclick="event.stopPropagation();toggleLabel('${escapeAttr(l)}')">${l}</span>`;
        });
        html += `</div>`;
      }

      const content = searchQuery ? highlightSearch(escapeHtml(turn.content), searchQuery) : escapeHtml(turn.content);
      html += `<div class="turn-content" id="cnt-${turn.idx}"><pre>${content}</pre></div>`;
      html += `</div>`;
    });

    html += `</div>`;
  });

  main.innerHTML = html;
}

// ── Interactions ──────────────────────────────────────────────────────
function toggleTurn(idx) {
  const content = document.getElementById(`cnt-${idx}`);
  const expand = document.getElementById(`exp-${idx}`);
  content.classList.toggle('open');
  expand.classList.toggle('open');
}

function scrollToPhase(pi) {
  document.getElementById(`phase-${pi}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.phase-item').forEach((el, i) => {
    el.classList.toggle('active', i === pi);
  });
}

function scrollToTurn(idx) {
  const card = document.querySelector(`.turn-card[data-idx="${idx}"]`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.add('highlighted');
    setTimeout(() => card.classList.remove('highlighted'), 2000);
    // Expand it
    const content = document.getElementById(`cnt-${idx}`);
    const expand = document.getElementById(`exp-${idx}`);
    if (content && !content.classList.contains('open')) {
      content.classList.add('open');
      expand?.classList.add('open');
    }
  }
}

function toggleLabel(label) {
  activeLabel = activeLabel === label ? null : label;
  renderTurns();
  // Re-render label badges in sidebar
  document.querySelectorAll('.label-badge').forEach(el => {
    el.classList.toggle('active', el.textContent === activeLabel);
  });
}

function highlightSearch(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── Event listeners ───────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderTurns();
});

document.getElementById('toggleThinking').addEventListener('click', function() {
  this.dataset.active = this.dataset.active === 'true' ? 'false' : 'true';
  this.classList.toggle('active');
  renderTurns();
});

document.getElementById('toggleTool').addEventListener('click', function() {
  this.dataset.active = this.dataset.active === 'true' ? 'false' : 'true';
  this.classList.toggle('active');
  renderTurns();
});

// Track scroll position for phase nav highlighting
let scrollTimer;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const groups = document.querySelectorAll('.phase-group');
    let active = 0;
    groups.forEach((g, i) => {
      const rect = g.getBoundingClientRect();
      if (rect.top <= 100) active = i;
    });
    document.querySelectorAll('.phase-item').forEach((el, i) => {
      el.classList.toggle('active', i === active);
    });
  }, 50);
});

// ── Init ──────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
